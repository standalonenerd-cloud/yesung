<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주예성여고 2026 선택과목 시뮬레이터</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            /* 예성여고 테마 컬러 (자주/와인톤) */
            --md-sys-color-primary: #8a1c3e;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #ffdadb;
            --md-sys-color-on-primary-container: #3b0014;
            --md-sys-color-surface: #fdfcff;
            --md-sys-color-outline: #73777f;
            
            --semester-1-color: #8a1c3e;
            --semester-2-color: #5c1229;

            /* Category Colors - 모든 교과 유채색 고유 팔레트 적용 */
            --cat-korean: #EF4444;       /* 국어: 빨강 */
            --cat-math: #3B82F6;         /* 수학: 파랑 */
            --cat-english: #F59E0B;      /* 영어: 주황 */
            --cat-history: #4D7C0F;      /* 역사: 올리브/진녹색 */
            --cat-geography: #0891B2;    /* 지리: 청록/바다색 */
            --cat-social: #059669;       /* 일반사회/윤리: 민트/청록 */
            --cat-science: #8B5CF6;      /* 통합과학: 보라 */
            --cat-physics: #4338CA;      /* 물리: 짙은 인디고 */
            --cat-chemistry: #C026D3;    /* 화학: 자홍(Fuchsia) */
            --cat-biology: #65A30D;      /* 생명: 연두/라임 */
            --cat-earth: #0284C7;        /* 지구과학: 하늘(Sky) */
            --cat-pe: #E11D48;           /* 체육: 로즈/짙은 핑크 */
            --cat-music: #EC4899;        /* 음악: 핑크 */
            --cat-art: #9333EA;          /* 미술: 진보라 */
            --cat-tech: #14B8A6;         /* 생활/기술/정보: 밝은 청록(Teal) */
            --cat-foreign: #B45309;      /* 제2외국어/한문: 갈색/오렌지브라운 */
            --cat-liberal: #9F1239;      /* 교양: 와인레드 */
            --cat-default: #94A3B8;      /* 예외 처리용 (기본값) */
        }

        body {
            font-family: 'Roboto', -apple-system, sans-serif;
            background-color: #f1f3f6;
            color: #1e293b;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--md-sys-color-primary);
            color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 54px;
            box-sizing: border-box;
            z-index: 2000;
        }

        .track-select {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }
        .track-select option {
            color: #333;
            background: white;
        }

        .main-tabs {
            position: relative;
            display: flex;
            background: white;
            padding: 2px;
            border-bottom: 1px solid #e2e8f0;
            justify-content: center;
            height: 40px;
            box-sizing: border-box;
            z-index: 2000;
        }

        .main-tab-btn {
            padding: 4px 16px;
            border: none;
            background: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--md-sys-color-outline);
        }

        .main-tab-btn.active {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .main-tab-btn.utility {
            font-size: 0.78rem;
            opacity: 0.75;
        }

        .copy-selection-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-selection-btn:hover { background: rgba(255,255,255,0.3); }
        .copy-selection-btn .material-icons-round { font-size: 16px; }

        #simWrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .simulator-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 40px;
            padding: 20px;
            box-sizing: border-box;
            background-color: #e2e8f0;
            z-index: 10;
            overflow-x: auto;
        }

        .semester-panel {
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            height: 100%;
            position: relative;
            border: 1px solid #cbd5e1;
            min-width: 150px;
        }

        .semester-panel::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 1) 90%);
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 20;
            opacity: 1;
        }
        .semester-panel.scrolled-to-bottom::after { opacity: 0; }

        .semester-header {
            padding: 6px;
            font-weight: 700;
            font-size: 0.75rem;
            color: white;
            text-align: center;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .sem-header-1 { background-color: var(--semester-1-color); }
        .sem-header-2 { background-color: var(--semester-2-color); }
        .semester-header.sem-complete {
            background-color: #15803d;
            box-shadow: inset 0 -3px 0 #bbf7d0;
        }
        .semester-complete-badge {
            display: none;
            padding: 1px 5px;
            border-radius: 999px;
            background: rgba(255,255,255,0.22);
            font-size: 0.62rem;
            font-weight: 700;
        }
        .semester-header.sem-complete .semester-complete-badge { display: inline-flex; }

        .semester-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 80px 8px;
            scrollbar-width: thin;
            z-index: 10;
        }

        .semester-content::-webkit-scrollbar { width: 4px; }
        .semester-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .course-item {
            padding: 4px 6px;
            margin-bottom: 6px;
            border-radius: 6px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 0.7rem;
            background-color: white;
            position: relative;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .course-item.mandatory { 
            cursor: default; 
            background-color: #e2e8f0;
            border-color: #cbd5e1;
            color: #64748b;
        }
        .course-item.mandatory .check-box { color: #94a3b8; }
        .course-item.mandatory .course-name { color: #475569; }

        .course-item.group-hover {
            border-color: #64748b !important;
            box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.1);
            transform: translateY(-1px);
        }

        .course-item.selected {
            background-color: #fff0f3 !important;
            border-color: var(--md-sys-color-primary) !important;
        }

        .course-item.group-complete {
            border-color: #22c55e;
            box-shadow: inset 4px 0 0 #22c55e;
        }

        .item-row { display: flex; align-items: flex-start; gap: 6px; width: 100%; }
        .check-box { font-size: 16px; color: #cbd5e1; flex-shrink: 0; }
        .mandatory .check-box { color: #64748b; }
        .selected .check-box { color: var(--md-sys-color-primary); }
        .course-name { font-weight: 700; flex: 1; line-height: 1.2; word-break: keep-all; }

        .badges-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
        .tag { padding: 1px 4px; border-radius: 4px; font-size: 0.6rem; font-weight: 700; color: white; }
        .tag.extra-info {
            display: inline-flex;
            align-items: center;
            gap: 1px;
            background-color: #f97316;
            font-size: 0.55rem;
        }
        
        .group-separator {
            margin: 8px 0 4px;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #475569;
            background-color: #f1f5f9;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .group-separator.group-complete {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #22c55e;
        }
        .group-status { color: #ef4444; }
        .group-separator.group-complete .group-status { color: #15803d; }

        #svgOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        .path-arrow {
            stroke-width: 1.5; fill: none; transition: opacity 0.3s, stroke-width 0.3s; opacity: 0.05;
        }
        .path-arrow.active { opacity: 0.4; stroke-width: 2; }
        .path-arrow.selected-path { opacity: 0.8; stroke-width: 4; }

        .summary-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 4px 16px;
            display: flex;
            justify-content: flex-end;
            gap: 24px;
            height: 32px;
            align-items: center;
            font-size: 0.85rem;
            z-index: 2000;
        }
        .stat-val { font-weight: 700; color: var(--md-sys-color-primary); }

        .hidden { display: none !important; }

        /* Tooltip */
        #courseTooltip {
            position: fixed; background: white; border: 1px solid #cbd5e1; padding: 12px;
            border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 5000; width: 280px; pointer-events: none; display: none;
            flex-direction: column; gap: 8px; font-size: 0.8rem; line-height: 1.5;
        }
        .tooltip-title { font-weight: 700; font-size: 0.9rem; color: var(--md-sys-color-primary); border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; margin-bottom: 4px; }
        .tooltip-row { display: flex; gap: 8px; }
        .tooltip-label { font-weight: 700; color: #64748b; flex-shrink: 0; width: 80px; }
        .tooltip-value { color: #1e293b; }
        .tooltip-desc { margin-top: 4px; padding-top: 4px; border-top: 1px dashed #e2e8f0; color: #475569; font-style: italic; }

        /* Full Data Table (원자료 뷰) */
        .full-data-table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            background: white; border: 1px solid #cbd5e1; border-radius: 8px;
            overflow: hidden; font-size: 0.78rem;
        }
        .full-data-table th, .full-data-table td {
            padding: 8px; border-bottom: 1px solid #e2e8f0; text-align: left;
            vertical-align: middle; white-space: nowrap;
        }
        .full-data-table th {
            position: sticky; top: 0; z-index: 1; background: #f1f5f9; color: #334155; font-weight: 700;
        }

        /* 기타 대입 권장과목 스타일 */
        .admission-container {
            flex: 1; overflow: hidden; padding: 14px 18px; box-sizing: border-box;
            background: #f1f3f6; display: flex; flex-direction: column; gap: 10px;
        }
        .admission-toolbar { background: white; border: 1px solid #dbe3ef; border-radius: 8px; padding: 12px; box-shadow: 0 2px 5px rgba(15, 23, 42, 0.06); }
        .admission-title-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
        .admission-title { margin: 0; font-size: 1rem; color: #0f172a; }
        .admission-note { color: #64748b; font-size: 0.75rem; }
        .admission-controls { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(180px, 1.2fr) minmax(220px, 1.4fr) auto; gap: 10px; align-items: end; }
        .admission-control { display: flex; flex-direction: column; gap: 4px; position: relative; }
        .admission-control label { font-size: 0.72rem; font-weight: 700; color: #475569; }
        .admission-input { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 0.8rem; outline: none; }
        .admission-button {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            border: none; border-radius: 7px; padding: 9px 12px; background: var(--md-sys-color-primary); color: white;
            font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap;
        }
        .admission-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; max-height: 220px; overflow-y: auto; background: white; border: 1px solid #cbd5e1; z-index: 3500; }
        .admission-dropdown-item { padding: 8px 10px; cursor: pointer; font-size: 0.78rem; }
        .admission-dropdown-item:hover { background: #f1f5f9; }
        .admission-selected-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 24px; align-items: center; }
        .admission-chip { border: 1px solid #ffdadb; background: #fff0f3; color: var(--md-sys-color-primary); border-radius: 999px; padding: 3px 8px; font-size: 0.72rem; font-weight: 700; cursor: pointer; }
        .admission-count { font-size: 0.78rem; color: #475569; display: flex; justify-content: space-between; align-items: center; }
        .admission-table-wrapper { flex: 1; overflow: auto; background: white; border: 1px solid #dbe3ef; border-radius: 8px; }
        .admission-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.78rem; }
        .admission-table th, .admission-table td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .admission-table th { position: sticky; top: 0; z-index: 2; background: #3b0014; color: white; text-align: left; }
    </style>
</head>
<body>

<div id="courseTooltip"></div>
<div id="admissionPopover" class="admission-popover"></div>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <span class="material-icons-round" style="font-size:24px;">school</span>
        <h1 style="margin:0; font-size:1.1rem; font-weight: 700;">충주예성여고 교육과정 로드맵 시뮬레이터</h1>
        
        <select id="trackSelect" class="track-select" onchange="loadTrackData(this.value)">
            <option value="general">일반 과정</option>
            <option value="music">음악 중점 과정</option>
        </select>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
        <div id="simStats" style="font-size:0.85rem; opacity:0.9;">
            총 이수 학점: <span id="totalCredits" style="font-weight:700;">0</span>
        </div>
        <button id="copySelectionBtn" class="copy-selection-btn" onclick="copySelectedCourses()">
            <span class="material-icons-round">content_copy</span>
            과목 복사
        </button>
    </div>
</header>

<div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchTab('simulator')">로드맵 시뮬레이터</button>
    <button class="main-tab-btn" onclick="switchTab('admission')">대입 권장과목 검색</button>
    <button class="main-tab-btn utility" onclick="switchTab('full')">원자료 표</button>
</div>

<div id="simWrapper">
    <svg id="svgOverlay"></svg>
    <div id="tab-simulator" class="simulator-container"></div>
</div>

<div id="tab-full" class="hidden" style="flex:1; overflow:auto; padding:16px;">
    <div id="fullViewContent"></div>
</div>

<div id="tab-admission" class="hidden admission-container">
    <div class="admission-toolbar">
        <div class="admission-title-row">
            <h2 class="admission-title">2028학년도 대입 반영 및 권장과목 검색</h2>
            <div class="admission-note">전국 주요 대학 발표 기준</div>
        </div>
        <div class="admission-controls">
            <div class="admission-control">
                <label>대학 필터</label>
                <input class="admission-input" type="text" id="admissionUniInput" placeholder="대학명 입력 또는 선택" autocomplete="off">
                <div id="admissionUniDropdown" class="admission-dropdown"></div>
            </div>
            <div class="admission-control">
                <label>학과/모집단위 검색</label>
                <input class="admission-input" type="text" id="admissionDeptSearch" placeholder="예: 간호, 국어국문, 심리">
            </div>
            <div class="admission-control">
                <label>과목 검색</label>
                <input class="admission-input" type="text" id="admissionSubjectSearch" placeholder="예: 확률과 통계, 정치">
            </div>
            <button id="admissionLoadSelectedBtn" class="admission-button" type="button">
                <span class="material-icons-round">playlist_add</span> 선택과목 연동
            </button>
        </div>
        <div id="admissionSelectedChips" class="admission-selected-strip"></div>
    </div>
    <div id="admissionCountInfo" class="admission-count"></div>
    <div class="admission-table-wrapper">
        <table class="admission-table">
            <thead>
                <tr>
                    <th style="width:12%">대학</th>
                    <th style="width:26%">모집단위</th>
                    <th style="width:30%">핵심과목</th>
                    <th style="width:24%">권장과목</th>
                    <th style="width:8%">비고</th>
                </tr>
            </thead>
            <tbody id="admissionTableBody">
                <tr><td style="text-align:center; padding: 40px; color: #666;" colspan="5">데이터를 불러오는 중입니다.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="summary-bar" id="summaryBar">
    <div>선택 과목: <span id="totalSelected" class="stat-val">0</span>개 | 공통/필수 학점: <span id="totalMandatoryCredits" class="stat-val">0</span></div>
</div>

<script src="course_metadata.js"></script>
<script src="admission_recommendations.js"></script>

<script>
    let rawData = [];
    let groupsData = [];
    let selectedCourses = new Set();
    const semesters = ["1-1", "1-2", "2-1", "2-2", "3-1", "3-2"];
    let creativeActivityCredits = 18; // 충주예성여고 창체 기본 18학점
    const graduationCredits = 192;
    let admissionInitialized = false;
    let admissionSelectedUni = 'all';
    let admissionCurrentFiltered = [];
    let admissionHideTimer = null;

    // 1. 확실하게 교과 세부 카테고리를 분류하는 함수
    function getCourseCategory(row) {
        const subject = row['과목명'] || '';
        const cat = row['교과군'] || '';
        
        // 우선 과목명 키워드 위주로 분류하여 회색(기타)으로 빠지는 현상 방지
        if (subject.includes('국어') || subject.includes('화법') || subject.includes('독서') || subject.includes('언어') || subject.includes('문학') || subject.includes('매체')) return '국어';
        if (subject.includes('수학') || subject.includes('미적분') || subject.includes('확률') || subject.includes('기하') || subject.includes('대수') || subject.includes('통계')) return '수학';
        if (subject.includes('영어')) return '영어';
        
        if (cat.includes('예술') || subject.includes('음악') || subject.includes('미술') || subject.includes('합창') || subject.includes('합주') || subject.includes('시창') || subject.includes('공연')) {
            if (subject.includes('음악') || subject.includes('합창') || subject.includes('합주') || subject.includes('시창') || subject.includes('공연')) return '음악';
            if (subject.includes('미술') || subject.includes('조형')) return '미술';
            return '예술'; 
        }
        
        if (cat.includes('사회') || subject.includes('역사') || subject.includes('지리') || subject.includes('사회') || subject.includes('윤리')) {
            if (['한국사', '세계사', '동아시아', '역사'].some(k => subject.includes(k))) return '역사';
            if (['지리'].some(k => subject.includes(k))) return '지리';
            if (['윤리', '사회', '법', '정치', '경제', '문화'].some(k => subject.includes(k))) return '일반사회/윤리';
            return '사회'; // 통합사회 등
        }
        
        if (cat.includes('과학') || subject.includes('물리') || subject.includes('화학') || subject.includes('생명') || subject.includes('생물') || subject.includes('지구') || subject.includes('우주') || subject.includes('물질') || subject.includes('세포')) {
            if (subject.includes('물리') || subject.includes('역학') || subject.includes('전자기')) return '물리';
            if (subject.includes('화학') || subject.includes('물질')) return '화학';
            if (subject.includes('생명') || subject.includes('생물') || subject.includes('세포')) return '생명';
            if (subject.includes('지구') || subject.includes('우주') || subject.includes('행성')) return '지구과학';
            return '과학'; // 통합과학 등
        }
        
        if (cat.includes('체육') || subject.includes('스포츠') || subject.includes('운동')) return '체육';
        if (cat.includes('제2외국어') || cat.includes('한문') || subject.includes('중국어') || subject.includes('일본어') || subject.includes('한문')) return '제2외국어/한문';
        if (cat.includes('교양') || subject.includes('보건') || subject.includes('철학') || subject.includes('심리')) return '교양';
        if (cat.includes('기술') || cat.includes('가정') || cat.includes('정보') || cat.includes('생활') || subject.includes('인공지능') || subject.includes('지식 재산')) return '생활/기술/정보';
        
        return '기타'; // 만약 매칭되지 않으면 fallback (거의 없을 것임)
    }

            '역사': 'var(--cat-history)',

            '일반사회/윤리': 'var(--cat-social)',
            '사회': 'var(--cat-social)',
            '물리': 'var(--cat-physics)',
            '화학': 'var(--cat-chemistry)',
            '생명': 'var(--cat-biology)',
            '지구과학': 'var(--cat-earth)',
            '과학': 'var(--cat-science)',
            '체육': 'var(--cat-pe)',
            '음악': 'var(--cat-music)',
            '미술': 'var(--cat-art)',
            '예술': 'var(--cat-music)',
